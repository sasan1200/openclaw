services:
  openclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile.tony
    image: openclaw-tony:local
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Dual-mount workspace at host path so DooD sandbox spawning resolves correctly.
      # OpenClaw uses this path as bind mount source when spawning subagent containers.
      - ${OPENCLAW_WORKSPACE_DIR}:${OPENCLAW_WORKSPACE_DIR}
